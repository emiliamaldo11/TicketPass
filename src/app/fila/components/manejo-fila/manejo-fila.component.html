<div *ngIf="usuario" class="flex flex-col items-center bg-[#1E1D1B] min-h-screen">

  <div class="contenedor-flex-vertical flex flex-col items-center mt-12">

    <h2 class="titulo-fila inter regular text-[44px] mb-[40px] text-[#FAFAFA]">Welcome to the Queue, {{ usuario.nombre
      }}!</h2>

    <button type="button" class="boton-ingresar mb-[80px] w-[422px] h-[40px] rounded-[100px] text-white transition-colors duration-200
         disabled:cursor-not-allowed
         disabled:bg-gray-400
         disabled:text-gray-700
         bg-[#631BE9] hover:bg-[#551BC1]" (click)="agregarCliente(usuario.nombre)" [disabled]="estaEnFila">Join the
      Queue</button>


    <ul class="lista-fila flex justify-center items-center mb-[20px]">
      <li *ngFor="let cliente of fila" class="item-fila items-center flex gap-[20px] flex-col">
        <p class="text-[24px] text-[#FAFAFA]">People ahead of you:</p>
        <span
          class="flex justify-center items-center turno bg-[#21C183] p-2 text-[#FAFAFA] rounded-[8px] font-bold text-center w-[100px] h-[50px]">
          {{ cliente.turno }}
        </span>
      </li>
    </ul>

  </div>


  <div class="barra-progreso-container bg-[#D9D9D9] w-[1079px] h-[25px]">
    <div class="barra-progreso" [style.width.%]="progreso"></div>
  </div>


  <div *ngIf="cancionSeleccionada" class="song-preview">

    <div class="song-info">
      <img [src]="cancionSeleccionada.album.images[0].url" alt="Portada del álbum" class="album-cover" />
      <div class="text-info">
        <h3>{{ cancionSeleccionada.name }}</h3>
        <p class="artist">{{ cancionSeleccionada.artists[0].name }}</p>
      </div>
    </div>
    <audio #audioPlayer controls autoplay>
      <source [src]="cancionSeleccionada?.preview_url" type="audio/mpeg">
      Tu navegador no soporta el elemento de audio.
    </audio>

    <div *ngIf="estaEnFila" class="spotify-message">
      <p>Play the {{ evento?.artista_banda }} playlist while you wait.</p>
    </div>

    <!-- Icono de Spotify -->
    <a *ngIf="estaEnFila" [href]="artistPlaylistUrl" target="_blank" rel="noopener noreferrer">
    <img
  src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/spotify.svg"
  alt="Spotify"
  class="w-[20px] h-[20px]"
/>
    </a>
  </div>

</div>
