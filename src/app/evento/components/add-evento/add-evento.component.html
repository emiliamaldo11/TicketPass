<section class="bg-[#FAFAFA] pl-[60px] pt-[45px] pr-[60px] w-full min-h-screen">

  <form #formulario="ngForm" (ngSubmit)="eventoIn ? emitUpdate(formulario) : addEvento(formulario)">

    <!-- HEADER -->
    <div class="flex justify-between items-center w-full mb-[60px]">
      <h2 class="font-bold text-[44px]">
        {{ eventoIn ? 'Edit Event' : 'Add Event' }}
      </h2>

      <button
        type="submit"
        class="bg-[#631BE9] hover:bg-[#551BC1] transition-colors duration-200 text-white px-[30px] h-[45px] rounded-[100px] disabled:bg-gray-400">
        {{ eventoIn ? 'Save Changes' : 'Save Event' }}
      </button>
    </div>


    <div class="flex flex-col gap-[24px]">

      <!-- EVENT DETAILS -->
      <fieldset class="bg-[#F6F6F6] px-[30px] py-[30px]">

        <h4 class="font-bold text-[30px] pb-[30px]">Event Details</h4>

        <div class="grid grid-cols-2 gap-[40px]">

          <!-- columna izquierda -->
          <div class="flex flex-col gap-[16px]">

            <div class="flex flex-col">
              <label for="nombreEvento">Event name</label>
              <input
                type="text"
                id="nombreEvento"
                class="w-[385px] h-[35px] border border-[#6B7280] rounded-[8px]"
                name="nombreEvento"
                [(ngModel)]="evento.nombreEvento"
                #nombreEvento="ngModel"
                required
              />

              <div class="divAvisos" *ngIf="nombreEvento.invalid && nombreEvento.touched">
                Please complete this field
              </div>
            </div>

            <div class="flex flex-col">
              <label for="nombreArtistaBanda">Singer or band</label>

              <input
                type="text"
                id="nombreArtistaBanda"
                class="w-[385px] h-[35px] border border-[#6B7280] rounded-[8px]"
                name="nombreArtistaBanda"
                [(ngModel)]="evento.artista_banda"
                #nombreArtistaBanda="ngModel"
                required
              />

              <div class="divAvisos" *ngIf="nombreArtistaBanda.invalid && nombreArtistaBanda.touched">
                Please complete this field
              </div>
            </div>

          </div>


          <!-- columna derecha -->
          <div class="flex flex-col gap-[16px]">

            <div class="flex flex-col">
              <label for="duracion">Duration</label>

              <input
                type="time"
                id="duracion"
                class="w-[385px] h-[35px] border border-[#6B7280] rounded-[8px]"
                name="duracion"
                [(ngModel)]="evento.duracion"
                #duracion="ngModel"
                required
              />

              <div class="divAvisos" *ngIf="duracion.invalid && duracion.touched">
                Please complete this field
              </div>
            </div>

            <div class="flex flex-col">
              <label for="bannerEvento">Banner URL</label>

              <input
                type="text"
                id="bannerEvento"
                class="w-[385px] h-[35px] border border-[#6B7280] rounded-[8px]"
                name="bannerEvento"
                [(ngModel)]="evento.UrlBanner"
                #bannerEvento="ngModel"
                placeholder="url/banner.com"
                required
              />

              <div class="divAvisos" *ngIf="bannerEvento.invalid && bannerEvento.touched">
                Please complete this field
              </div>
            </div>

          </div>

        </div>

      </fieldset>



      <!-- FECHAS + VENUE -->
      <div class="grid grid-cols-2 gap-[24px]">


        <!-- ADD NEW DATE -->
        <fieldset class="bg-[#F6F6F6] px-[30px] py-[30px]">

          <h4 class="font-bold text-[30px] pb-[30px]">Add new date</h4>

          <!-- fechas existentes -->
          <div class="flex flex-col gap-[16px]">

            <div *ngFor="let fecha of evento.fechas; let i = index">

              <h4 class="font-bold">Date {{ i + 1 }}</h4>

              <div class="flex flex-col">
                <label for="fecha-{{i}}">Date</label>

                <input
                  type="date"
                  id="fecha-{{i}}"
                  class="w-[385px] h-[35px] border border-[#6B7280] rounded-[8px]"
                  [(ngModel)]="fecha.fecha"
                  [ngModelOptions]="{standalone: true}"
                  required
                />
              </div>

              <div class="flex flex-col">
                <label for="horario-{{i}}">Event time</label>

                <input
                  type="time"
                  id="horario-{{i}}"
                  class="w-[385px] h-[35px] border border-[#6B7280] rounded-[8px]"
                  [(ngModel)]="fecha.hora"
                  [ngModelOptions]="{standalone: true}"
                  required
                />
              </div>

            </div>

          </div>


          <!-- agregar fecha -->
          <div *ngIf="mostrarFormularioFecha" class="flex flex-col gap-[16px] mt-[20px]">

            <div class="flex flex-col">
              <label for="nuevaFecha">Date</label>

              <input
                type="date"
                id="nuevaFecha"
                class="w-[385px] h-[35px] border border-[#6B7280] rounded-[8px]"
                [(ngModel)]="nuevaFecha.fecha"
                [ngModelOptions]="{standalone: true}"
                required
              />
            </div>


            <div class="flex items-end gap-[10px]">

              <div class="flex flex-col">
                <label for="nuevoHorario">Event time</label>

                <input
                  type="time"
                  id="nuevoHorario"
                  class="w-[385px] h-[35px] border border-[#6B7280] rounded-[8px]"
                  [(ngModel)]="nuevaFecha.hora"
                  [ngModelOptions]="{standalone: true}"
                  required
                />
              </div>

              <button
                type="button"
                class="bg-[#631BE9] hover:bg-[#551BC1] transition-colors duration-200 text-white rounded-[100px] w-[185px] h-[40px] disabled:bg-gray-400"
                (click)="aceptarFecha()">
                Save date
              </button>

            </div>

          </div>


          <button
            type="button"
            class="mt-[20px] bg-[#631BE9] text-white rounded-[100px] w-[60px] h-[30px] hover:bg-[#551BC1] transition-colors duration-200"
            *ngIf="!mostrarFormularioFecha"
            (click)="mostrarFormularioFecha = true">
            +
          </button>

        </fieldset>



        <!-- SELECT VENUE -->
        <fieldset class="bg-[#F6F6F6] px-[30px] py-[30px]">

          <h4 class="font-bold text-[30px] pb-[20px]">Select Venue</h4>

          <select
            name="seleccionRecinto"
            id="seleccionRecinto"
            class="w-[385px] h-[35px] border border-[#6B7280] rounded-[8px]"
            (change)="seleccionRecinto($event)"
            [disabled]="!fechaAgregada && !eventoIn"
            required
          >

            <option value="" disabled selected>Recintos</option>

            <option *ngFor="let recinto of listadoRecintos" [value]="recinto.id">
              {{ recinto.nombreRecinto }}
            </option>

          </select>


          <div
            class="mt-[20px]"
            *ngIf="evento.fechas && evento.fechas[0] && evento.fechas[0].entradas && evento.fechas[0].entradas.length > 0">

            <ul class="flex flex-col gap-[10px]">

              <li *ngFor="let entrada of evento.fechas[0].entradas">

                <h5>{{entrada.nombreSector}}</h5>

                <label for="precioSector-{{ entrada.nombreSector }}">$</label>

                <input
                  type="text"
                  id="precioSector-{{ entrada.nombreSector }}"
                  class="w-[120px] h-[35px] border border-[#6B7280] rounded-[8px]"
                  [(ngModel)]="entrada.precio"
                  [ngModelOptions]="{standalone: true}"
                  required
                />

              </li>

            </ul>

          </div>

        </fieldset>


      </div>

    </div>

  </form>

</section>
